spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ${APP_NAME:teknisio-backend}

  datasource:
    url: jdbc:h2:file:./data/teknisio_db
    username: ${H2_USER:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  address: 0.0.0.0
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET:teknisio_super_secret_key_minimum_32_characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    binders:
      processor:
        enabled: false
      system:
        enabled: false
